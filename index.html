<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Three.js Trig Explorer</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="scene-panel">
        <div id="scene-root" aria-label="3D unit circle scene"></div>
      </main>
      <aside class="side-panel">
        <section class="panel" aria-labelledby="controls-heading">
          <h2 id="controls-heading">Controls</h2>
          <p>Orbit: drag | Pan: right-drag | Zoom: wheel</p>
          <div class="control-grid">
            <button id="play-toggle" type="button">Play</button>
            <button id="step-angle" type="button">Step +15°</button>
            <label for="speed-input">Speed</label>
            <div class="inline-control">
              <input
                id="speed-input"
                type="range"
                min="0.25"
                max="4"
                step="0.25"
                value="1"
              />
              <span id="speed-readout">1.00x</span>
            </div>
            <label for="angle-slider">Angle (degrees)</label>
            <input
              id="angle-slider"
              type="range"
              min="0"
              max="360"
              step="0.1"
              value="0"
            />
            <label for="angle-input">Angle input</label>
            <input
              id="angle-input"
              type="number"
              min="0"
              max="360"
              step="0.1"
              value="0"
            />
            <span>Functions</span>
            <div class="toggle-grid">
              <label><input id="toggle-sin" type="checkbox" checked /> sin</label>
              <label><input id="toggle-cos" type="checkbox" checked /> cos</label>
              <label><input id="toggle-tan" type="checkbox" checked /> tan</label>
            </div>
          </div>
          <p id="control-error" class="error-text" aria-live="polite"></p>
        </section>
        <section class="panel" aria-labelledby="values-heading">
          <h2 id="values-heading">Values</h2>
          <p id="angle-radians">Angle: 0.00 rad</p>
          <p id="angle-degrees">Angle: 0.00°</p>
          <p id="sin-readout">sin(θ): 0.0000</p>
          <p id="cos-readout">cos(θ): 1.0000</p>
          <p id="tan-readout">tan(θ): 0.0000</p>
        </section>
        <section class="panel" aria-labelledby="plot-heading">
          <h2 id="plot-heading">2D Plot</h2>
          <canvas id="trig-plot" width="320" height="220" aria-label="Trig plot"></canvas>
        </section>
      </aside>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
